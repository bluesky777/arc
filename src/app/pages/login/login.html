<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Sign In</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <ng-template #noAuth>
        Please, authenticate.
        <hr />
      </ng-template>
      <div *ngIf="isAuthenticated; else noAuth">
        <br />

        Is Authenticated: {{ isAuthenticated }}

        <br />
        userData
        <pre>{{ userData$ | async | json }}</pre>
        <br />
    </div>
      <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="isAuthenticated">
        Login
      </button>
    </mat-card-content>
  </mat-card>
</div>
