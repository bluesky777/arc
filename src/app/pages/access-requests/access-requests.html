<mat-card class="form-card">
  <form [formGroup]="form" (ngSubmit)="createRequest()">
    <mat-card-header>
      <mat-card-title>New Access Request</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="form-row">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>User Email</mat-label>
          <input matInput formControlName="userEmail" readonly />
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Resource</mat-label>
          <mat-select formControlName="resource">
            <mat-option *ngFor="let resource of resourceOptions()" [value]="resource">
              {{ resource }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-row radio-group-row">
        <span class="radio-group-label">Request Type</span>
        <mat-radio-group formControlName="type" class="type-radio-group">
          <mat-radio-button value="READ">READ</mat-radio-button>
          <mat-radio-button value="WRITE">WRITE</mat-radio-button>
          <mat-radio-button value="ADMIN">ADMIN</mat-radio-button>
        </mat-radio-group>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitDisabled()">Save</button>
      <button mat-button type="button" (click)="cancel()">Cancel</button>
    </mat-card-actions>
  </form>
</mat-card>

<mat-card class="page-card">
  <mat-card-header>
    <mat-card-title>Access Requests</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="requests()">
      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let request">{{ request.user }}</td>
      </ng-container>
      <ng-container matColumnDef="resource">
        <th mat-header-cell *matHeaderCellDef>Resource</th>
        <td mat-cell *matCellDef="let request">{{ request.resource }}</td>
      </ng-container>
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let request">{{ request.type }}</td>
      </ng-container>
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let request">{{ request.date }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let request">
          <span class="status-badge" [class]="request.status.toLowerCase()">{{ request.status }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let request">
          <button mat-icon-button color="primary" (click)="approveRequest(request.id)" [disabled]="request.status !== 'Pending'"><mat-icon>check</mat-icon></button>
          <button mat-icon-button color="warn" (click)="rejectRequest(request.id)" [disabled]="request.status !== 'Pending'"><mat-icon>close</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
